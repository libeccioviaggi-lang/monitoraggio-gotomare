name: Monitoraggio Gotomare
on:
  schedule:
    # Esegue ai minuti 17 e 47 di ogni ora (es. 13:17, 13:47, 14:17...)
    - cron: '17,47 * * * *'
  workflow_dispatch: 

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium --with-deps
      
      - name: Run Tests
        continue-on-error: true
        run: npx playwright test

      - name: Save Results to Repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          if [ ! -f performance_log.csv ]; then
            echo "Timestamp,Localita,Secondi" > performance_log.csv
          fi
          
          git add performance_log.csv
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "Nessuna modifica da salvare."
          else
            git commit -m "Aggiornamento log performance [skip ci]"
            git pull --rebase
            git push
          fi
